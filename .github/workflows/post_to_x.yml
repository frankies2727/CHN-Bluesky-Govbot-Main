name: govbot-x-post-ai-data-centers

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:        # Allows manual run

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LLM_MODEL: "gemma3:4b"
      BOT_CATEGORY: "ai_data_centers"     # ← Only this category
      POST_LIMIT: "2"
      DRY_RUN: "1"                        # Change to "0" when ready to post live

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install govbot + fetch bills
        run: |
          curl -fsSL https://raw.githubusercontent.com/chihacknight/govbot/main/actions/govbot/scripts/install-nightly.sh | bash
          export PATH="$HOME/.govbot/bin:$PATH"
          govbot clone il   # Start with Illinois only (you can add more later)
          govbot logs --limit 1500 > bills.jsonl

      - name: Install Ollama + pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          nohup ollama serve > /dev/null 2>&1 &
          sleep 15
          ollama pull "$LLM_MODEL"

      - name: Post to X
        run: python scripts/post_to_x.py
